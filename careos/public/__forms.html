<!DOCTYPE html>
<html>
  <head><title>CareOS form definitions</title></head>
  <body>
    <!-- Static form definition so Netlify Forms detects and processes
         submissions posted from the React app. Not linked anywhere. -->
    <form name="faraz-feedback" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="faraz-feedback" />
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="text" name="feeling" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
