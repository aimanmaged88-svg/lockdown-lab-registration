<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          brand: {
            50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',300:'#fdba74',
            400:'#fb923c',500:'#f97316',600:'#ea580c',700:'#c2410c',
            800:'#9a3412',900:'#7c2d12'
          },
          ink: {
            900:'#0a0a0a',850:'#111111',800:'#161616',
            700:'#1e1e1e',600:'#262626',500:'#3a3a3a'
          }
        },
        fontFamily: {
          sans:['-apple-system','BlinkMacSystemFont','SF Pro Display','Segoe UI','Roboto','Helvetica','Arial','sans-serif']
        },
        boxShadow: {
          card:'0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35)',
          glow:'0 0 0 1px rgba(249,115,22,.35), 0 8px 30px rgba(249,115,22,.18)'
        },
        keyframes: {
          fadeUp:{'0%':{opacity:0,transform:'translateY(8px)'},'100%':{opacity:1,transform:'translateY(0)'}},
          pop:{'0%':{transform:'scale(.96)'},'60%':{transform:'scale(1.03)'},'100%':{transform:'scale(1)'}},
          slideIn:{'0%':{opacity:0,transform:'translateX(20px)'},'100%':{opacity:1,transform:'translateX(0)'}},
          ring:{'0%':{transform:'scale(.7)',opacity:.9},'100%':{transform:'scale(2.2)',opacity:0}}
        },
        animation:{
          fadeUp:'fadeUp .35s ease both',
          pop:'pop .3s ease',
          slideIn:'slideIn .3s ease both',
          ring:'ring .6s ease-out'
        }
      }
    }
  }
</script>
<style>
  html{-webkit-tap-highlight-color:transparent}
  body{background:#0a0a0a}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:9px}
  ::-webkit-scrollbar-track{background:transparent}
  .safe-b{padding-bottom:env(safe-area-inset-bottom)}
  .safe-t{padding-top:env(safe-area-inset-top)}
  .no-scrollbar::-webkit-scrollbar{display:none}
  .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
  /* animated checkbox */
  .chk{transition:all .18s ease}
  .chk:active{transform:scale(.9)}
  input[type="checkbox"].task:checked + label .box{
    background:#f97316;border-color:#f97316
  }
  input[type="checkbox"].task:checked + label .tick{opacity:1;transform:scale(1)}
  input[type="checkbox"].task:checked + label .ttl{color:#8a8a8a;text-decoration:line-through}
  .tick{opacity:0;transform:scale(.4);transition:all .2s ease}
  .view{animation:fadeUp .35s ease both}
  .navbtn.active{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;box-shadow:0 6px 18px rgba(249,115,22,.35)}
  details.acc[open] .chev{transform:rotate(90deg)}
  .chev{transition:transform .2s ease}
  .toast-in{animation:slideIn .3s ease both}
</style>

<body class="font-sans text-neutral-100 antialiased min-h-screen">

<!-- ===================== STAFF GATE ===================== -->
<div id="gate" class="fixed inset-0 z-50 bg-ink-900 flex items-center justify-center p-6">
  <div class="w-full max-w-sm bg-ink-850 rounded-3xl shadow-card border border-ink-700 p-7 animate-fadeUp">
    <div class="text-center mb-6">
      <img src="logo.png" alt="Eagles Gym" class="h-9 w-auto mx-auto mb-3" style="height:36px;width:auto;max-width:80%" />
      <p class="text-brand-500 font-semibold tracking-[0.25em] text-sm">STAFF HUB</p>
      <p class="text-neutral-400 text-sm mt-3">Clock in to start your shift. Every task you complete is stamped with your name — accountability, not paperwork.</p>
    </div>
    <label class="text-xs uppercase tracking-wider text-neutral-500 font-semibold">Enter your name to start your shift</label>
    <input id="staffName" type="text" autocomplete="name" placeholder="Your name" class="w-full mt-2 mb-3 bg-ink-800 border border-ink-600 rounded-2xl px-4 py-3 text-base focus:border-brand-500 focus:ring-2 focus:ring-brand-500/40 outline-none" />
    <div id="recentNames" class="flex flex-wrap gap-2 mb-4"></div>
    <button id="clockIn" class="w-full bg-gradient-to-br from-brand-500 to-brand-600 text-white font-bold py-3.5 rounded-2xl text-base active:scale-95 transition shadow-glow">Start Shift →</button>
    <p class="text-center text-[11px] text-neutral-600 mt-4">Runs offline · No login required · Data stays on this device</p>
  </div>
</div>

<!-- ===================== HEADER ===================== -->
<header class="safe-t sticky top-0 z-30 bg-ink-900/85 backdrop-blur-xl border-b border-ink-700">

    <img src="logo.png" alt="Eagles Gym" class="h-6 w-auto" style="height:24px;width:auto;max-width:60vw" />
    <div class="leading-none border-l border-ink-600 pl-3">
      <div class="text-[10px] text-brand-500 font-semibold tracking-[0.2em]">STAFF HUB</div>
    </div>
    <div class="ml-auto flex items-center gap-2 md:gap-3">
      <div class="text-right leading-tight">
        <div id="clock" class="font-bold text-brand-400 tabular-nums text-base">--:--</div>
        <div id="dateLabel" class="text-[10px] text-neutral-400">—</div>
      </div>
      <button id="followBell" title="Follow-ups due" class="relative hidden w-9 h-9 place-items-center bg-ink-800 border border-ink-600 rounded-full text-base active:scale-95 transition">📞<span id="followCount" class="absolute -top-1 -right-1 min-w-[16px] h-4 px-1 bg-red-500 text-white text-[10px] font-bold rounded-full grid place-items-center">0</span></button>
      <button id="bossBtn" title="Boss mode" class="w-9 h-9 grid place-items-center bg-ink-800 border border-ink-600 rounded-full text-base active:scale-95 transition">🔒</button>

        <span id="avatar" class="w-7 h-7 rounded-full bg-gradient-to-br from-brand-500 to-brand-600 grid place-items-center text-xs font-bold text-white">–</span>
        <span id="whoName" class="text-xs font-semibold max-w-[80px] truncate">—</span>
      </button>
    </div>
  </div>
</header>

/* ============================================================
   TASK STATE  (per-day, per-task completions)
   key: eg_done_<todayKey>  ->  { "<listKey>:<idx>": {by,time,date} }
   ============================================================ */
function doneMap(){ return store.get('done_'+todayKey(), {}); }
function saveDone(m){ store.set('done_'+todayKey(), m); }
function taskId(scope,idx){ return scope+':'+idx; }
function isDone(scope,idx){ return !!doneMap()[taskId(scope,idx)]; }
function setDone(scope,idx,on){
  const m = doneMap(); const id = taskId(scope,idx);
  if(on){ m[id] = {by:STAFF.name, time:nowTime(), date:nowDate()}; }
  else { delete m[id]; }
  saveDone(m);
}
function completionOf(scope,idx){ return doneMap()[taskId(scope,idx)]; }
function setNote(scope,idx,note){
  const m=doneMap(); const id=taskId(scope,idx);
  if(m[id]){ m[id].note=note; saveDone(m); }
}
/* clear today's completions for one scope (used when a boss edits its list) */
function clearScopeDone(scope){
  const m=doneMap(); Object.keys(m).forEach(k=>{ if(k.startsWith(scope+':')) delete m[k]; }); saveDone(m);
}

/* progress across a set of scope+count pairs */
function progress(pairs){
  let total=0,done=0;
  pairs.forEach(([scope,count])=>{
    total+=count;
    for(let i=0;i<count;i++) if(isDone(scope,i)) done++;
  });
  return {done,total,pct: total? Math.round(done/total*100):0};
}

/* Downscale + compress an image File to a small JPEG data URL.
   Phone photos are 2-6MB; localStorage caps at ~5MB, so we resize to
   maxDim and re-encode — keeps stored photos ~100-300KB and avoids
   silently blowing the storage quota. Returns a Promise<dataURL>. */
function compressImage(file, maxDim=1280, quality=0.7){
  return new Promise((resolve,reject)=>{
    if(!file || !/^image\//.test(file.type||'')){ reject(new Error('not an image')); return; }
    const fr=new FileReader();
    fr.onerror=()=>reject(fr.error||new Error('read failed'));
    fr.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject(new Error('decode failed'));
      img.onload=()=>{
        let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
        if(!w||!h){ resolve(fr.result); return; }
        if(w>maxDim||h>maxDim){ const s=Math.min(maxDim/w,maxDim/h); w=Math.max(1,Math.round(w*s)); h=Math.max(1,Math.round(h*s)); }
        try{
          const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
          cv.getContext('2d').drawImage(img,0,0,w,h);
          resolve(cv.toDataURL('image/jpeg',quality));
        }catch(e){ resolve(fr.result); } // fallback to original if canvas is unavailable
      };
      img.src=fr.result;
    };
    fr.readAsDataURL(file);
  });
}

function listFor(kind,key){

  if(kind==='cleaning')  return CLEANING[key].label+' cleaning';
  if(kind==='equipment') return 'Equipment checklist';
  return 'List';
}
function persistList(kind){
  if(kind==='checklist') saveChecklists();
  else if(kind==='cleaning') saveCleaning();
  else if(kind==='equipment') saveEquipment();
}
function scopeFor(kind,key){
  if(kind==='checklist') return key;
  if(kind==='cleaning')  return 'clean_'+key;
  if(kind==='equipment') return 'equipment';

    </div>`);

    $$('#editRows .eitem').forEach(inp=>inp.addEventListener('input',()=>{ items[+inp.dataset.i]=inp.value; }));
    $$('#editRows [data-del]').forEach(b=>b.addEventListener('click',()=>{ items.splice(+b.dataset.del,1); $('#editRows').innerHTML=rows(); rebind(); }));
  }
  rebind();
  $('#addItem').addEventListener('click',()=>{ items.push('New item'); $('#editRows').innerHTML=rows(); rebind();

/* wire checkbox + note behaviour after render */
function wireTasks(root=document){
  $$('input.task',root).forEach(cb=>{
    cb.addEventListener('change',()=>{
      setDone(cb.dataset.scope, +cb.dataset.idx, cb.checked);
      haptic();
      const wrap = cb.parentElement.querySelector('.notewrap');
      const stamp = wrap && wrap.querySelector('.stamp');
      if(cb.checked){
        if(wrap) wrap.classList.remove('hidden');
        if(stamp) stamp.innerHTML = `<span>✓ ${esc(STAFF.name)}</span><span>· ${nowTime()}</span>`;
      } else {
        if(wrap) wrap.classList.add('hidden');
        const nf = wrap && wrap.querySelector('.note'); if(nf) nf.value='';
      }
      updateLiveProgress();
    });
  });
  $$('input.note',root).forEach(inp=>{
    inp.addEventListener('input',()=>setNote(inp.dataset.nscope, +inp.dataset.nidx, inp.value));
  });
}

/* update any [data-prog] bars on the page */
function updateLiveProgress(){
  $$('[data-prog]').forEach(el=>{
    const pairs = JSON.parse(el.dataset.prog);
    const p = progress(pairs);
    const fill = el.querySelector('.pf'); const txt = el.querySelector('.pt');
    if(fill) fill.style.width = p.pct+'%';
    if(txt) txt.textContent = p.pct+'%';
    const meta = el.querySelector('.pm'); if(meta) meta.textContent = `${p.done}/${p.total} done`;
  });
  // refresh dashboard counters if present
  if(currentView==='dashboard') paintDashCounters();
}

const CALL_TYPES=[
  {k:'Payment',  ic:'💵', cls:'text-emerald-400 bg-emerald-500/10'},
  {k:'Call back',ic:'↩️', cls:'text-sky-400 bg-sky-500/10'},
  {k:'Enquiry',  ic:'❓', cls:'text-brand-400 bg-brand-500/10'},
  {k:'Booking',  ic:'📅', cls:'text-violet-400 bg-violet-500/10'},
  {k:'Complaint',ic:'😠', cls:'text-red-400 bg-red-500/10'},
  {k:'Other',    ic:'📌', cls:'text-neutral-300 bg-ink-700'}
];
function callTypeMeta(k){ return CALL_TYPES.find(t=>t.k===k)||CALL_TYPES[CALL_TYPES.length-1]; }
function getCalls(){ return store.get('calls',[]); }
function fmtDate(iso){ if(!iso) return ''; const d=new Date(iso+'T00:00:00'); return isNaN(d)?iso:d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }
function fmtDateShort(iso){ if(!iso) return ''; const d=new Date(iso+'T00:00:00'); return isNaN(d)?iso:d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}); }
function addDaysKey(iso,n){ const d=iso?new Date(iso+'T00:00:00'):new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function dueFollowups(){ const t=todayKey(); return getCalls().filter(c=>c.status!=='done'&&c.followDate&&c.followDate<=t).sort((a,b)=>(a.followDate||'').localeCompare(b.followDate||'')); }
function callActionLine(c){
  if(c.type==='Payment') return 'Will pay'+(c.amount?(' '+c.amount):'')+(c.followDate?(' on '+fmtDateShort(c.followDate)):'');
  if(c.action) return c.action;
  if(c.said) return c.said;
  return 'Follow up';
}
function callPlainLine(c){ return `${c.name} — ${callActionLine(c)}`; }

/* ---------- Calendar view ---------- */
let calY=null, calM=null, calSel=null;
function viewCalendar(){
  const now=new Date();
  if(calY==null){ calY=now.getFullYear(); calM=now.getMonth(); }
  const first=new Date(calY,calM,1);
  const monthName=first.toLocaleDateString('en-AU',{month:'long',year:'numeric'});
  const startWeekday=(first.getDay()+6)%7; // Monday-first
  const daysInMonth=new Date(calY,calM+1,0).getDate();
  const t=todayKey();
  const calls=getCalls().filter(c=>c.status!=='done'&&c.followDate);
  const byDate={}; calls.forEach(c=>{ (byDate[c.followDate]=byDate[c.followDate]||[]).push(c); });
  let cells='';
  for(let i=0;i<startWeekday;i++) cells+='<div></div>';
  for(let d=1; d<=daysInMonth; d++){
    const key=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const list=byDate[key]||[]; const isToday=key===t; const sel=key===calSel; const overdue=list.length&&key<t;
    cells+=`<button data-calday="${key}" class="aspect-square rounded-xl border ${sel?'border-brand-500 bg-brand-500/10':'border-ink-700'} ${isToday?'ring-1 ring-brand-500/60':''} flex flex-col items-center justify-center active:scale-95 transition">
      <span class="text-[13px] ${isToday?'font-bold text-brand-400':'text-neutral-200'}">${d}</span>
      ${list.length?`<span class="text-[9px] font-bold ${overdue?'text-red-400':'text-brand-400'} leading-none mt-0.5">●${list.length>1?' '+list.length:''}</span>`:''}
    </button>`;
  }
  const agenda=(calSel?(byDate[calSel]||[]):calls.filter(c=>{const [yy,mm]=c.followDate.split('-');return +yy===calY&&+mm===calM+1;})).sort((a,b)=>a.followDate.localeCompare(b.followDate));
  const WD=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  return `
  ${sectionHead('📅','Calendar','Follow-ups from your phone calls — who is due to pay or be called, and when.')}
  ${card(`<div class="p-5">

function wireCalendar(){

  $('#calToday')?.addEventListener('click',()=>{ const n=new Date(); calY=n.getFullYear(); calM=n.getMonth(); calSel=todayKey(); render('calendar'); });
  $('#calClear')?.addEventListener('click',()=>{ calSel=null; render('calendar'); });
  $$('[data-calday]').forEach(b=>b.addEventListener('click',()=>{ calSel=(calSel===b.dataset.calday?null:b.dataset.calday); render('calendar'); }));

/* ---------- follow-up alerts ---------- */
function toggleCallDone(id){
  const calls=getCalls(); const c=calls.find(x=>x.id===id);
  if(!c) return;
  c.status = c.status==='done'?'open':'done';
  trySet('calls',calls); updateFollowBell(dueFollowups().length);
  if(!$('#modalHost').classList.contains('hidden')){ const due=dueFollowups(); if(due.length) showAlerts(due); else closeModal(); }
  if(['dashboard','calls','calendar'].includes(currentView)) render(currentView);
}
function updateFollowBell(n){
  const bell=$('#followBell'); if(!bell) return;
  if(n>0){ bell.classList.remove('hidden'); bell.classList.add('grid'); const c=$('#followCount'); if(c) c.textContent=n; }
  else { bell.classList.add('hidden'); bell.classList.remove('grid'); }
}
function showAlerts(list){
  if(!list||!list.length) return;

            <span class="font-semibold flex-1 min-w-0 truncate">${esc(c.name)}</span>

          </div>

          <div class="flex gap-2 mt-2">

  $$('[data-alertdone]').forEach(b=>b.addEventListener('click',()=>{
    const calls=getCalls(); const c=calls.find(x=>x.id===b.dataset.alertdone); if(c) c.status='done';
    trySet('calls',calls); afterAlertAction();
  }));
  $$('[data-alertsnooze]').forEach(b=>b.addEventListener('click',()=>{
    const calls=getCalls(); const c=calls.find(x=>x.id===b.dataset.alertsnooze); if(c){ c.followDate=addDaysKey(todayKey(),1); c.alerted=''; }
    trySet('calls',calls); afterAlertAction();
  }));
}
function afterAlertAction(){
  const due=dueFollowups(); updateFollowBell(due.length);
  if(due.length) showAlerts(due); else closeModal();
  if(['dashboard','calls','calendar'].includes(currentView)) render(currentView);
}
function checkFollowups(){
  const due=dueFollowups(); updateFollowBell(due.length);
  const t=todayKey();
  const fresh=due.filter(c=>c.alerted!==t);
  if(fresh.length){
    const calls=getCalls();
    fresh.forEach(f=>{ const c=calls.find(x=>x.id===f.id); if(c) c.alerted=t; });
    trySet('calls',calls);
    fresh.forEach(f=>fireReminder('Call '+f.name, callPlainLine(f)));
    if($('#modalHost').classList.contains('hidden')) showAlerts(due);
  }
}

function openTasksModal(){
  const groups=[

    ['Afternoon','afternoon',CHECKLISTS.afternoon.items],
    ['Closing','closing',CHECKLISTS.closing.items],
    ['Cleaning · hourly','clean_hourly',CLEANING.hourly.items],
    ['Cleaning · 2-hourly','clean_twoHour',CLEANING.twoHour.items],

/* ---------- Idea Lab + brainstorm helper ---------- */
const IDEA_CATS = ['Recovery','Tech','Classes','Community','Retention','Retail','Space','Brand','Wellness','Access','Other'];
const CAT_BENEFIT = {
  Recovery:'help members recover better and come back more often',
  Tech:'make the gym run smoother and feel modern',
  Classes:'add value to the timetable and pull in new members',
  Community:"build a community people don't want to leave",
  Retention:'keep members longer and cut cancellations',
  Retail:'add an easy extra revenue stream',
  Space:'make the floor more useful and inviting',
  Brand:'make Eagles Gym stand out and get talked about',
  Wellness:'look after members beyond just the workout',
  Access:'open the gym up to more people and hours',
  Other:'improve the member experience'
};
function shortTitle(raw){
  let t=(raw||'').split(/[.!?\n]/)[0].replace(/\s+/g,' ').trim();
  const w=t.split(' '); if(w.length>7) t=w.slice(0,7).join(' ')+'…';
  return (t||'New idea').replace(/^./,c=>c.toUpperCase());
}
/* offline brainstorm helper — expands a rough note into a structured plan */
function formulateIdea(raw, cat){
  raw=(raw||'').trim(); const c=cat||'Other';
  const benefit=CAT_BENEFIT[c]||CAT_BENEFIT.Other;
  const lower=raw? raw.charAt(0).toLowerCase()+raw.slice(1) : 'this';
  const related=IDEAS.filter(i=>i.c===c);
  return {
    c, custom:true,
    title: shortTitle(raw),
    pitch: `Bring ${lower} to Eagles Gym to ${benefit}.`,
    why: `It's a simple change members notice — it ${benefit}.`,
    steps: [
      'Pin down the details: what it looks like, what it costs, and who runs it.',
      'Trial it small for 2–4 weeks and ask members what they think.',
      'If it lands, make it permanent — add signage and post it on the socials.'
    ],
    first: 'This week: sketch the plan, price it up, and run it past the team.',
    angles: ideaAngles(raw),
    pair: related.length? related[Math.floor(Math.random()*related.length)].t : null
  };
}
function ideaAngles(raw){
  const r=(raw||'').toLowerCase(); const a=[];
  if(/app|online|book|qr|screen|digital/.test(r)) a.push('Tie it into a booking screen or the members app so it’s effortless to use.');
  if(/class|session|program|coach|train/.test(r)) a.push('Add a beginner-friendly version so nobody feels left out.');
  if(/sauna|ice|recover|massage|stretch|mobility|cold/.test(r)) a.push('Sell it as a paid recovery add-on — members love recovery perks.');
  if(/member|discount|price|deal|offer|refer|mate|friend/.test(r)) a.push('Wrap it in a "bring a mate" or referral hook — members are your best sales team.');
  if(/event|comp|challenge|social|community|leaderboard/.test(r)) a.push('Put a leaderboard or photo wall up so it builds buzz.');
  if(/coffee|shake|drink|snack|retail|merch|protein/.test(r)) a.push('Place it near the exit for easy impulse buys.');
  if(/kid|child|creche|family|parent/.test(r)) a.push('Even one supervised hour unlocks the parents market.');
  if(/24|hour|access|late|early|night|fob/.test(r)) a.push('Fob access for trusted members captures odd-hour trainers.');
  return a;
}

/* ============================================================
   REMINDERS
   ============================================================ */
let remTimers=[];
function toggleReminders(){
  const on = !store.get('reminders_on',false);
  if(on){
    if('Notification' in window && Notification.permission==='default'){ Notification.requestPermission(); }
    startReminders(); toast('Reminders ON — you\'ll be pinged','🔔');
  } else {
    stopReminders(); toast('Reminders off','🔕');
  }
  store.set('reminders_on',on);
  render('cleaning');
}
function fireReminder(title,body){
  toast(`🔔 ${body}`, '🔔');
  haptic([220,90,220]);
  if('Notification' in window && Notification.permission==='granted'){
    try{ new Notification('Eagles Gym · '+title,{body,tag:'eg-'+title,icon:APP_ICON,vibrate:[220,90,220]}); }catch(e){}
  }
}
function startReminders(){
  stopReminders();
  if(!store.get('reminders_on',false)) return;
  // group interval reminders so one interval fires a single combined ping
  const groups={};
  REMINDERS.filter(r=>r.interval!=='close').forEach(r=>{
    const k=String(r.interval); (groups[k]=groups[k]||[]).push(r.text);
  });
  Object.entries(groups).forEach(([mins,texts])=>{
    const t=setInterval(()=>fireReminder(intervalLabel(+mins), texts.join(' · ')), (+mins)*60*1000);
    remTimers.push(t);
  });
}
function stopReminders(){ remTimers.forEach(clearInterval); remTimers=[]; }
/* fire "At close" reminders once, when closing time is reached */
function checkClosing(){
  if(!store.get('reminders_on',false)) return;
  const ct=store.get('closingTime','21:00'); if(!ct) return;
  const flag='closefired_'+todayKey();
  if(store.get(flag,false)) return;
  const now=new Date();
  const cur=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  if(cur>=ct){
    const closers=REMINDERS.filter(r=>r.interval==='close').map(r=>r.text);
    if(closers.length){ fireReminder('At close', closers.join(' · ')); }
    store.set(flag,true);
  }
}

function tickClock(){
  const c=$('#clock'); if(c) c.textContent=nowTime();
  const d=$('#dateLabel'); if(d) d.textContent=new Date().toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
  if(currentView==='dashboard') paintDashCounters();
  updateFollowBell(dueFollowups().length);
  checkClosing();
}

function bootApp(){
  // header identity
  $('#whoName').textContent = STAFF.name;
  $('#avatar').textContent = initials(STAFF.name);
  // boss button
  setBoss(bossMode);
  $('#bossBtn').addEventListener('click',toggleBoss);
  // follow-up bell -> open the due-list alert
  $('#followBell').addEventListener('click',()=>{ const due=dueFollowups(); if(due.length) showAlerts(due); else render('calendar'); });
  // ensure on-shift includes current staff
  const os=store.get('onshift',[]); if(!os.includes(STAFF.name)){ os.push(STAFF.name); store.set('onshift',os); }
  // reminders resume
  if(store.get('reminders_on',false)) startReminders();
  // render last view
  render(store.get('lastView','dashboard'));
  tickClock(); setInterval(tickClock,1000*15);
  checkFollowups(); setInterval(checkFollowups, 60*1000);
  $('#gate').style.display='none';
}

/* who button -> switch staff */
$('#whoBtn').addEventListener('click',()=>{
  openModal(`
    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold">Switch staff</h3>
        <button onclick="closeModal()" class="text-neutral-500 hover:text-white text-2xl leading-none">×</button>
      </div>
      <p class="text-sm text-neutral-400 mb-4">Currently on shift as <b class="text-brand-400">${esc(STAFF.name)}</b>.</p>
      <input id="switchName" type="text" placeholder="Type a name to switch" class="w-full bg-ink-800 border border-ink-600 rounded-2xl px-4 py-3 text-base mb-2 focus:border-brand-500 outline-none" />
      <button id="switchGo" class="w-full bg-gradient-to-br from-brand-500 to-brand-600 text-white font-bold py-3 rounded-2xl active:scale-95 transition mb-4">Switch</button>
      ${ROSTER.length?`<p class="text-[11px] text-neutral-600 mb-2">Recent:</p><div class="space-y-2">
        ${ROSTER.slice().reverse().slice(0,8).map(n=>`<button data-switch="${esc(n)}" class="w-full text-left bg-ink-800 hover:bg-ink-700 border border-ink-700 rounded-2xl px-4 py-3 font-semibold flex items-center gap-3">
          <span class="w-8 h-8 rounded-full bg-gradient-to-br from-brand-500 to-brand-600 grid place-items-center text-xs font-bold text-white">${initials(n)}</span>${esc(n)}</button>`).join('')}
      </div>`:''}
      <button onclick="closeModal()" class="mt-5 w-full bg-ink-700 text-neutral-200 font-semibold py-3 rounded-2xl">Cancel</button>
    </div>`);
  const doSwitch=(name)=>{
    name=(name||'').trim(); if(!name) return;
    STAFF={name}; store.set('staff',STAFF); rememberName(name);
    $('#whoName').textContent=STAFF.name; $('#avatar').textContent=initials(STAFF.name);
    const os=store.get('onshift',[]); if(!os.includes(STAFF.name)){os.push(STAFF.name);store.set('onshift',os);}
    closeModal(); render(currentView); toast('Now on shift: '+STAFF.name,'🦅');
  };
  $('#switchGo').addEventListener('click',()=>doSwitch($('#switchName').value));
  $('#switchName').addEventListener('keydown',e=>{ if(e.key==='Enter') doSwitch($('#switchName').value); });
  $$('[data-switch]').forEach(b=>b.addEventListener('click',()=>doSwitch(b.dataset.switch)));
});

/* ============================================================
   GATE
   ============================================================ */
function initGate(){
  const rn=$('#recentNames');
  if(ROSTER.length){
    rn.innerHTML = `<span class="w-full text-[11px] text-neutral-600 mb-0.5">Been here before? Tap your name:</span>` +
      ROSTER.slice().reverse().slice(0,8).map(n=>`<button class="recent bg-ink-800 border border-ink-600 rounded-full px-3 py-1.5 text-sm active:scale-95 transition" data-name="${esc(n)}">${esc(n)}</button>`).join('');
    $$('#recentNames .recent').forEach(b=>b.addEventListener('click',()=>{ $('#staffName').value=b.dataset.name; go(); }));
  }
  function go(){
    const name=$('#staffName').value.trim();
    if(!name){ $('#staffName').classList.add('ring-2','ring-red-500'); toast('Type your name to start','⚠️'); return; }
    STAFF={name}; store.set('staff',STAFF); rememberName(name); bootApp();
  }
  $('#clockIn').addEventListener('click',go);
  $('#staffName').addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
  setTimeout(()=>$('#staffName').focus(),60);
}

/* ============================================================
   START
   ============================================================ */
if(STAFF && STAFF.name){ bootApp(); }
else { initGate(); }

// register service worker for offline (optional, safe if missing)
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
