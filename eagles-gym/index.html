    darkMode: 'class',

      extend: {
        colors: {
          brand: {
            50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',300:'#fdba74',

            800:'#9a3412',900:'#7c2d12'
          },
          ink: {
            900:'#0a0a0a',850:'#111111',800:'#161616',
            700:'#1e1e1e',600:'#262626',500:'#3a3a3a'
          }
        },
        fontFamily: {
          sans:['-apple-system','BlinkMacSystemFont','SF Pro Display','Segoe UI','Roboto','Helvetica','Arial','sans-serif']
        },
        boxShadow: {
          card:'0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35)',
          glow:'0 0 0 1px rgba(249,115,22,.35), 0 8px 30px rgba(249,115,22,.18)'
        },
        keyframes: {
          fadeUp:{'0%':{opacity:0,transform:'translateY(8px)'},'100%':{opacity:1,transform:'translateY(0)'}},
          pop:{'0%':{transform:'scale(.96)'},'60%':{transform:'scale(1.03)'},'100%':{transform:'scale(1)'}},

          ring:{'0%':{transform:'scale(.7)',opacity:.9},'100%':{transform:'scale(2.2)',opacity:0}}
        },
        animation:{
          fadeUp:'fadeUp .35s ease both',
          pop:'pop .3s ease',
          slideIn:'slideIn .3s ease both',
          ring:'ring .6s ease-out'
        }
      }
    }
  }
</script>

/* ============================================================
   TASK STATE  (per-day, per-task completions)
   key: eg_done_<todayKey>  ->  { "<listKey>:<idx>": {by,time,date} }
   ============================================================ */
function doneMap(){ return store.get('done_'+todayKey(), {}); }
function saveDone(m){ store.set('done_'+todayKey(), m); }
function taskId(scope,idx){ return scope+':'+idx; }
function isDone(scope,idx){ return !!doneMap()[taskId(scope,idx)]; }
function setDone(scope,idx,on){
  const m = doneMap(); const id = taskId(scope,idx);
  if(on){ m[id] = {by:STAFF.name, time:nowTime(), date:nowDate()}; }
  else { delete m[id]; }
  saveDone(m);
}
function completionOf(scope,idx){ return doneMap()[taskId(scope,idx)]; }

/* progress across a set of scope+count pairs */
function progress(pairs){
  let total=0,done=0;
  pairs.forEach(([scope,count])=>{
    total+=count;
    for(let i=0;i<count;i++) if(isDone(scope,i)) done++;
  });
  return {done,total,pct: total? Math.round(done/total*100):0};
}

/* ============================================================

function toast(msg,icon='✅'){
  const t = document.createElement('div');
  t.className='toast-in pointer-events-auto bg-ink-800 border border-ink-600 rounded-2xl px-4 py-3 shadow-card flex items-center gap-2 max-w-sm';
  t.innerHTML = `<span class="text-lg">${icon}</span><span class="text-sm font-medium">${msg}</span>`;
  $('#toasts').appendChild(t);
  setTimeout(()=>{ t.style.transition='all .3s'; t.style.opacity='0'; t.style.transform='translateY(10px)'; setTimeout(()=>t.remove(),300); },2600);
}
function haptic(ms=15){ if(navigator.vibrate) navigator.vibrate(ms); }

function openModal(html){

  $('#modalHost').classList.remove('hidden');

  $('#modalHost').classList.remove('flex');
}
$('#modalHost').addEventListener('click',e=>{ if(e.target.id==='modalHost') closeModal(); });

function card(inner,cls=''){ return `<div class="bg-ink-850 border border-ink-700 rounded-3xl shadow-card ${cls}">${inner}</div>`; }

function progressBar(pct,label=''){
  return `<div class="flex items-center gap-3">
    <div class="flex-1 h-2.5 rounded-full bg-ink-700 overflow-hidden">
      <div class="h-full rounded-full bg-gradient-to-r from-brand-400 to-brand-600 transition-all duration-500" style="width:${pct}%"></div>

    <span class="text-sm font-bold text-brand-400 tabular-nums w-10 text-right">${pct}%</span>
    ${label?`<span class="text-xs text-neutral-500">${label}</span>`:''}
  </div>`;
}

/* build a checkbox task row */
function taskRow(scope,idx,text){
  const c = completionOf(scope,idx);
  const checked = c? 'checked':'';
  const stamp = c? `<div class="text-[11px] text-neutral-500 mt-0.5 flex flex-wrap gap-x-2">
      <span>✓ ${c.by}</span><span>· ${c.time}</span></div>`:'';
  return `<div class="chk flex items-start gap-3 py-3 px-1 border-b border-ink-700/60 last:border-0">
    <input type="checkbox" class="task hidden" id="${scope}_${idx}" data-scope="${scope}" data-idx="${idx}" ${checked} />
    <label for="${scope}_${idx}" class="flex items-start gap-3 flex-1 cursor-pointer select-none">
      <span class="box mt-0.5 w-6 h-6 shrink-0 rounded-lg border-2 border-ink-500 grid place-items-center transition">
        <svg class="tick w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </span>
      <span class="flex-1">
        <span class="ttl text-[15px] font-medium leading-snug">${text}</span>
        ${stamp}
      </span>
    </label>
  </div>`;
}

/* wire checkbox behaviour after render */
function wireTasks(root=document){
  $$('input.task',root).forEach(cb=>{
    cb.addEventListener('change',()=>{
      setDone(cb.dataset.scope, +cb.dataset.idx, cb.checked);
      haptic();
      if(cb.checked){
        // add stamp live
        const lbl = cb.nextElementSibling.querySelector('.flex-1');
        if(lbl && !lbl.querySelector('.stamp')){
          const s=document.createElement('div');
          s.className='stamp text-[11px] text-neutral-500 mt-0.5 flex flex-wrap gap-x-2';
          s.innerHTML=`<span>✓ ${STAFF.name}</span><span>· ${nowTime()}</span>`;
          lbl.appendChild(s);
        }
      } else {
        const s=cb.nextElementSibling.querySelector('.stamp'); if(s) s.remove();
      }
      updateLiveProgress();
    });
  });
}

/* update any [data-prog] bars on the page */
function updateLiveProgress(){
  $$('[data-prog]').forEach(el=>{
    const pairs = JSON.parse(el.dataset.prog);
    const p = progress(pairs);
    const fill = el.querySelector('.pf'); const txt = el.querySelector('.pt');
    if(fill) fill.style.width = p.pct+'%';
    if(txt) txt.textContent = p.pct+'%';
    const meta = el.querySelector('.pm'); if(meta) meta.textContent = `${p.done}/${p.total} done`;
  });
  // refresh dashboard counters if present
  if(currentView==='dashboard') paintDashCounters();
}

  // desktop layout: side nav + content
  app.innerHTML = `
    <aside class="hidden md:block w-56 shrink-0">
      <div class="sticky top-20 space-y-1">
        ${NAV.map(n=>navItem(n,view)).join('')}
      </div>
    </aside>
    <section class="flex-1 min-w-0 view">${VIEWS[view]()}</section>`;
  // mobile bottom nav
  $('#bottomNav .flex').innerHTML = NAV.map(n=>`
    <button data-go="${n.id}" class="navbtn ${n.id===view?'active':''} shrink-0 flex flex-col items-center gap-0.5 min-w-[64px] px-2 py-1.5 rounded-2xl transition">
      <span class="text-xl">${n.icon}</span>
      <span class="text-[9px] font-semibold leading-none text-center">${n.label.split(' ')[0]}</span>
    </button>`).join('');
  wireTasks();
  wireView(view);
  window.scrollTo({top:0,behavior:'smooth'});
}
function navItem(n,view){
  const active = n.id===view;
  return `<button data-go="${n.id}" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-2xl text-left transition ${active?'bg-gradient-to-br from-brand-500 to-brand-600 text-white shadow-glow font-semibold':'hover:bg-ink-800 text-neutral-300'}">
    <span class="text-lg">${n.icon}</span><span class="text-sm">${n.label}</span>
  </button>`;
}

/* ============================================================
   PER-VIEW WIRING
   ============================================================ */
function wireView(view){
  // global go buttons
  $$('[data-go]').forEach(b=>b.addEventListener('click',()=>{ render(b.dataset.go); }));

  if(view==='dashboard'){
    $('#addShift')?.addEventListener('click',()=>{
      const n = prompt('Add staff to shift:'); if(!n) return;
      const list = store.get('onshift',[STAFF.name]); if(!list.includes(n)){ list.push(n); store.set('onshift',list); }
      $('#shiftChips').innerHTML = renderShiftChips(list); wireShiftChips();
      $('#dashShift') && ($('#dashShift').textContent=list.length);
    });
    wireShiftChips();
  }

  if(view==='checklist'){
    $('#resetDay')?.addEventListener('click',()=>{
      if(confirm("Reset ALL of today's checklist ticks? This clears the stamps too.")){
        store.del('done_'+todayKey()); render('checklist'); toast('Today reset','↩️');
      }
    });
  }

  if(view==='cleaning'){
    $('#toggleRem')?.addEventListener('click',toggleReminders);
  }

  if(view==='equipment'){
    $('#reportBroken')?.addEventListener('click',openEquipModal);
    wireEquipList();
  }

  if(view==='guide' || view==='memberships'){
    $$('.guideBtn').forEach(b=>b.addEventListener('click',()=>{
      openGuide(JSON.parse(decodeURIComponent(b.dataset.guide)));
    }));
  }

  if(view==='issues'){
    $('#newIssue')?.addEventListener('click',openIssueModal);
    $('#clearResolved')?.addEventListener('click',()=>{
      const list=store.get('issues',[]).filter(i=>i.status!=='resolved');
      store.set('issues',list); render('issues');
    });
    wireIssueList();
  }

  if(view==='handover'){
    $$('[data-hf]').forEach(t=>t.addEventListener('input',()=>{
      const d=store.get('handoverDraft',{}); d[t.dataset.hf]=t.value; store.set('handoverDraft',d);
    }));
    $('#submitHandover')?.addEventListener('click',submitHandover);
  }
}

function wireShiftChips(){
  $$('[data-rmshift]').forEach(b=>b.addEventListener('click',()=>{
    const n=b.dataset.rmshift; let list=store.get('onshift',[STAFF.name]).filter(x=>x!==n);
    store.set('onshift',list); $('#shiftChips').innerHTML=renderShiftChips(list); wireShiftChips();
    $('#dashShift') && ($('#dashShift').textContent=list.length);
  }));
}

/* ---------- equipment report ---------- */
function openEquipModal(){
  openModal(`
    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold">⚠️ Report Broken Equipment</h3>
        <button onclick="closeModal()" class="text-neutral-500 hover:text-white text-2xl leading-none">×</button>
      </div>
      <div class="space-y-3">
        <div><label class="text-xs uppercase tracking-wider text-neutral-500 font-semibold">Equipment</label>
          <input id="eqName" placeholder="e.g. Leg press machine" class="w-full mt-1.5 bg-ink-800 border border-ink-600 rounded-2xl px-4 py-3 focus:border-brand-500 outline-none" /></div>
        <div><label class="text-xs uppercase tracking-wider text-neutral-500 font-semibold">Issue</label>
          <textarea id="eqIssue" rows="2" placeholder="What's wrong with it?" class="w-full mt-1.5 bg-ink-800 border border-ink-600 rounded-2xl px-4 py-3 resize-none focus:border-brand-500 outline-none"></textarea></div>
        <div><label class="text-xs uppercase tracking-wider text-neutral-500 font-semibold">Priority</label>
          <div class="grid grid-cols-4 gap-2 mt-1.5" id="eqPri">
            ${['Low','Medium','High','Urgent'].map((p,i)=>`<button data-pri="${p}" class="pri-opt border border-ink-600 rounded-xl py-2 text-sm font-semibold ${i===1?'ring-2 ring-brand-500 bg-brand-500/10 text-brand-400':''}">${p}</button>`).join('')}
          </div></div>
        <div><label class="text-xs uppercase tracking-wider text-neutral-500 font-semibold">Photo (optional)</label>
          <input id="eqPhoto" type="file" accept="image/*" class="w-full mt-1.5 text-sm text-neutral-400 file:mr-3 file:rounded-xl file:border-0 file:bg-ink-700 file:text-neutral-200 file:px-3 file:py-2" />
          <div id="eqPhotoPrev"></div></div>
        <p class="text-xs text-neutral-500">Submitted by <b class="text-neutral-300">${STAFF.name}</b></p>
        <button id="eqSubmit" class="w-full bg-gradient-to-br from-red-500 to-red-600 text-white font-bold py-3 rounded-2xl active:scale-95 transition">Submit report</button>
      </div>
    </div>`);
  let pri='Medium', photo='';
  $$('#eqPri .pri-opt').forEach(b=>b.addEventListener('click',()=>{
    pri=b.dataset.pri;
    $$('#eqPri .pri-opt').forEach(x=>x.className='pri-opt border border-ink-600 rounded-xl py-2 text-sm font-semibold');
    b.className='pri-opt border border-ink-600 rounded-xl py-2 text-sm font-semibold ring-2 ring-brand-500 bg-brand-500/10 text-brand-400';
  }));
  $('#eqPhoto').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ photo=r.result; $('#eqPhotoPrev').innerHTML=`<img src="${photo}" class="mt-2 rounded-xl max-h-32" />`; }; r.readAsDataURL(f);
  });
  $('#eqSubmit').addEventListener('click',()=>{
    const equipment=$('#eqName').value.trim(); const issue=$('#eqIssue').value.trim();
    if(!equipment){ toast('Enter the equipment name','⚠️'); return; }
    const list=store.get('equipReports',[]);
    list.push({id:uid(),equipment,issue,priority:pri,photo,by:STAFF.name,time:nowTime(),date:nowDate()});
    store.set('equipReports',list);
    // also mirror into issues stream
    const iss=store.get('issues',[]); iss.push({id:uid(),category:'Equipment',desc:`${equipment} — ${issue}`,priority:pri,by:STAFF.name,time:nowTime(),date:nowDate(),status:'open'}); store.set('issues',iss);
    closeModal(); render('equipment'); toast('Equipment reported','🛠️'); haptic(25);
  });
}
function wireEquipList(){
  $$('[data-rmreport]').forEach(b=>b.addEventListener('click',()=>{
    const list=store.get('equipReports',[]).filter(r=>r.id!==b.dataset.rmreport);
    store.set('equipReports',list); render('equipment');
  }));
}

/* ---------- issue report ---------- */
function openIssueModal(){
  const cats=['Cleaning','Equipment','Member complaint','Maintenance','Safety','Stock'];
  openModal(`
    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold">🚨 Report an issue</h3>
        <button onclick="closeModal()" class="text-neutral-500 hover:text-white text-2xl leading-none">×</button>
      </div>
      <div class="space-y-3">
        <div><label class="text-xs uppercase tracking-wider text-neutral-500 font-semibold">Category</label>
          <div class="grid grid-cols-2 gap-2 mt-1.5" id="isCat">
            ${cats.map((c,i)=>`<button data-cat="${c}" class="cat-opt border border-ink-600 rounded-xl py-2 text-sm font-semibold ${i===0?'ring-2 ring-brand-500 bg-brand-500/10 text-brand-400':''}">${c}</button>`).join('')}
          </div></div>
        <div><label class="text-xs uppercase tracking-wider text-neutral-500 font-semibold">Details</label>
          <textarea id="isDesc" rows="3" placeholder="Describe the issue…" class="w-full mt-1.5 bg-ink-800 border border-ink-600 rounded-2xl px-4 py-3 resize-none focus:border-brand-500 outline-none"></textarea></div>
        <div><label class="text-xs uppercase tracking-wider text-neutral-500 font-semibold">Priority</label>
          <div class="grid grid-cols-4 gap-2 mt-1.5" id="isPri">
            ${['Low','Medium','High','Urgent'].map((p,i)=>`<button data-pri="${p}" class="pri-opt border border-ink-600 rounded-xl py-2 text-sm font-semibold ${i===1?'ring-2 ring-brand-500 bg-brand-500/10 text-brand-400':''}">${p}</button>`).join('')}
          </div></div>
        <p class="text-xs text-neutral-500">Reported by <b class="text-neutral-300">${STAFF.name}</b></p>
        <button id="isSubmit" class="w-full bg-gradient-to-br from-brand-500 to-brand-600 text-white font-bold py-3 rounded-2xl active:scale-95 transition">Submit issue</button>
      </div>
    </div>`);
  let cat=cats[0], pri='Medium';
  $$('#isCat .cat-opt').forEach(b=>b.addEventListener('click',()=>{ cat=b.dataset.cat;
    $$('#isCat .cat-opt').forEach(x=>x.className='cat-opt border border-ink-600 rounded-xl py-2 text-sm font-semibold');
    b.className='cat-opt border border-ink-600 rounded-xl py-2 text-sm font-semibold ring-2 ring-brand-500 bg-brand-500/10 text-brand-400';
  }));
  $$('#isPri .pri-opt').forEach(b=>b.addEventListener('click',()=>{ pri=b.dataset.pri;
    $$('#isPri .pri-opt').forEach(x=>x.className='pri-opt border border-ink-600 rounded-xl py-2 text-sm font-semibold');
    b.className='pri-opt border border-ink-600 rounded-xl py-2 text-sm font-semibold ring-2 ring-brand-500 bg-brand-500/10 text-brand-400';
  }));
  $('#isSubmit').addEventListener('click',()=>{
    const desc=$('#isDesc').value.trim(); if(!desc){ toast('Add some details','⚠️'); return; }
    const list=store.get('issues',[]);
    list.push({id:uid(),category:cat,desc,priority:pri,by:STAFF.name,time:nowTime(),date:nowDate(),status:'open'});
    store.set('issues',list); closeModal(); render('issues'); toast('Issue reported','🚨'); haptic(25);
  });
}
function wireIssueList(){
  $$('[data-toggleissue]').forEach(b=>b.addEventListener('click',()=>{
    const list=store.get('issues',[]); const it=list.find(i=>i.id===b.dataset.toggleissue);
    if(it){ it.status = it.status==='resolved'?'open':'resolved'; store.set('issues',list); render('issues'); }
  }));
}

/* ---------- handover submit ---------- */
function submitHandover(){
  const d=store.get('handoverDraft',{});
  if(!Object.values(d).some(v=>v && v.trim())){ toast('Fill in at least one field','⚠️'); return; }
  const log=store.get('handovers',[]);
  log.push({...d, by:STAFF.name, time:nowTime(), date:nowDate()});
  store.set('handovers',log); store.del('handoverDraft');
  render('handover'); toast('Handover submitted','✍️'); haptic(25);
}

/* ============================================================
   REMINDERS
   ============================================================ */
let remTimers=[];
function toggleReminders(){
  const on = !store.get('reminders_on',false);
  if(on){
    if('Notification' in window && Notification.permission==='default'){ Notification.requestPermission(); }
    startReminders(); toast('Reminders ON — you\'ll be pinged','🔔');
  } else {
    stopReminders(); toast('Reminders off','🔕');
  }
  store.set('reminders_on',on);
  render('cleaning');
}
function fireReminder(r){
  toast(`${r.icon} ${r.title}: ${r.body}`, '🔔');
  haptic([200,80,200]);
  if('Notification' in window && Notification.permission==='granted'){
    try{ new Notification('Eagles Gym · '+r.title,{body:r.body,tag:r.id,icon:'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E🦅%3C/text%3E%3C/svg%3E'}); }catch(e){}
  }
}
function startReminders(){
  stopReminders();
  REMINDERS.forEach(r=>{
    const t=setInterval(()=>fireReminder(r), r.every*60*1000);
    remTimers.push(t);
  });
}
function stopReminders(){ remTimers.forEach(clearInterval); remTimers=[]; }

/* ============================================================
   CLOCK + BOOT
   ============================================================ */
function tickClock(){
  const c=$('#clock'); if(c) c.textContent=nowTime();
  const d=$('#dateLabel'); if(d) d.textContent=new Date().toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
  if(currentView==='dashboard') paintDashCounters();
}

function bootApp(){
  // header identity
  $('#whoName').textContent = STAFF.name;
  $('#avatar').textContent = initials(STAFF.name);
  // ensure on-shift includes current staff
  const os=store.get('onshift',[]); if(!os.includes(STAFF.name)){ os.push(STAFF.name); store.set('onshift',os); }
  // reminders resume
  if(store.get('reminders_on',false)) startReminders();
  // render last view
  render(store.get('lastView','dashboard'));
  tickClock(); setInterval(tickClock,1000*15);
  $('#gate').style.display='none';
}

/* who button -> switch staff */
$('#whoBtn').addEventListener('click',()=>{
  openModal(`
    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold">Switch staff</h3>
        <button onclick="closeModal()" class="text-neutral-500 hover:text-white text-2xl leading-none">×</button>
      </div>
      <p class="text-sm text-neutral-400 mb-4">Currently on shift as <b class="text-brand-400">${STAFF.name}</b>.</p>
      <div class="space-y-2">
        ${ROSTER.map(n=>`<button data-switch="${n}" class="w-full text-left bg-ink-800 hover:bg-ink-700 border border-ink-700 rounded-2xl px-4 py-3 font-semibold flex items-center gap-3">
          <span class="w-8 h-8 rounded-full bg-gradient-to-br from-brand-500 to-brand-600 grid place-items-center text-xs font-bold text-white">${initials(n)}</span>${n}</button>`).join('')}
      </div>
      <button onclick="closeModal()" class="mt-5 w-full bg-ink-700 text-neutral-200 font-semibold py-3 rounded-2xl">Cancel</button>
    </div>`);
  $$('[data-switch]').forEach(b=>b.addEventListener('click',()=>{
    STAFF={name:b.dataset.switch}; store.set('staff',STAFF);
    $('#whoName').textContent=STAFF.name; $('#avatar').textContent=initials(STAFF.name);
    const os=store.get('onshift',[]); if(!os.includes(STAFF.name)){os.push(STAFF.name);store.set('onshift',os);}
    closeModal(); render(currentView); toast('Now on shift: '+STAFF.name,'🦅');
  }));
});

/* ============================================================
   GATE
   ============================================================ */
function initGate(){
  const sel=$('#staffSelect');
  sel.innerHTML = `<option value="">Select staff…</option>` + ROSTER.map(n=>`<option>${n}</option>`).join('');
  $('#clockIn').addEventListener('click',()=>{
    const name = ($('#staffCustom').value.trim() || sel.value).trim();
    if(!name){ $('#staffCustom').classList.add('ring-2','ring-red-500'); toast('Pick or type your name','⚠️'); return; }
    STAFF={name}; store.set('staff',STAFF);
    if(!ROSTER.includes(name)){ ROSTER.push(name); store.set('roster',ROSTER); }
    bootApp();
  });
}

/* ============================================================
   START
   ============================================================ */
if(STAFF && STAFF.name){ bootApp(); }
else { initGate(); }

// register service worker for offline (optional, safe if missing)
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
