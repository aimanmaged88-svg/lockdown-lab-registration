<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#090909">
<meta name="robots" content="noindex,nofollow">
<title>Launchpad — Your Apps, Links & Codes</title>
<style>
  :root{
    --bg:#090909; --card:#121212; --card2:#171717; --line:#262626; --line2:#333;
    --text:#F5F5F5; --muted:#B4B4B4; --dim:#8A8A8A;
    --accent:#FF7A00; --accent-soft:rgba(255,122,0,.12); --on-accent:#1A0E00;
    --good:#30D158; --good-soft:rgba(48,209,88,.12); --bad:#FF453A; --bad-soft:rgba(255,69,58,.12);
    --pc:var(--accent); --pc-soft:var(--accent-soft);
    --r:18px; --r-sm:12px; --r-pill:999px;
    --fd:'Bebas Neue',-apple-system,system-ui,sans-serif;
    --fb:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
    --fm:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--fb);line-height:1.5;
    padding:max(18px,env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
    max-width:560px;margin:0 auto;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}

  /* header */
  .hd{display:flex;align-items:center;gap:12px;margin:6px 0 4px}
  .logo{width:44px;height:44px;flex:none;border-radius:13px;background:var(--accent-soft);
    display:grid;place-items:center;border:1px solid var(--line)}
  .logo svg{width:26px;height:26px;color:var(--accent)}
  .hd h1{font-family:var(--fd);font-size:32px;letter-spacing:1px;line-height:.95;font-weight:400}
  .hd h1 i{font-style:normal;color:var(--accent)}
  .hd p{font-size:12.5px;color:var(--dim);margin-top:3px}
  .private{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--r-sm);padding:11px 13px;margin:16px 0 6px;font-size:12.5px;color:var(--muted)}
  .private b{color:var(--text)}
  .private .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none;box-shadow:0 0 0 4px var(--accent-soft)}

  /* ============ HOME: project grid ============ */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  @media(max-width:400px){.grid{grid-template-columns:1fr}}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 15px;
    cursor:pointer;text-align:left;color:inherit;position:relative;overflow:hidden;
    transition:border-color .15s,transform .06s;display:flex;flex-direction:column;gap:0;min-height:132px}
  .tile::after{content:'';position:absolute;inset:0 0 auto 0;height:3px;background:var(--tpc,var(--accent));opacity:.9}
  .tile:active{transform:scale(.98)}
  .tile:hover,.tile:focus-visible{border-color:var(--tpc,var(--accent));outline:none}
  .tile .ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:23px;
    background:var(--card2);border:1px solid var(--line);margin-bottom:12px}
  .tile h3{font-family:var(--fd);font-size:22px;letter-spacing:.5px;font-weight:400;line-height:1;margin-bottom:5px}
  .tile .tag{font-size:11.5px;color:var(--dim);line-height:1.3}
  .tile .foot{display:flex;align-items:center;gap:6px;margin-top:auto;padding-top:11px}
  .tile .arrow{margin-left:auto;color:var(--tpc,var(--accent));font-size:15px}
  .badge{font-family:var(--fm);font-size:9px;letter-spacing:1px;text-transform:uppercase;
    padding:4px 8px;border-radius:var(--r-pill);border:1px solid var(--line);color:var(--muted)}
  .badge.live{color:var(--good);border-color:var(--good);background:var(--good-soft)}
  .badge.new{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
  .badge.pick{color:var(--muted)}

  .owner-tile{grid-column:1 / -1;min-height:0;flex-direction:row;align-items:center;gap:13px;
    border-style:dashed;padding:14px 15px}
  .owner-tile::after{display:none}
  .owner-tile .ic{margin-bottom:0}
  .owner-tile h3{margin-bottom:2px}

  /* ============ DETAIL view ============ */
  .back{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    color:var(--muted);font-size:13px;font-weight:600;border-radius:var(--r-pill);padding:9px 16px 9px 12px;
    margin:8px 0 2px;cursor:pointer;transition:.15s}
  .back:active{transform:scale(.96)} .back:hover{border-color:var(--line2);color:var(--text)}

  .hero{display:flex;align-items:flex-start;gap:13px;margin:16px 0 2px}
  .hero .ic{width:52px;height:52px;flex:none;border-radius:14px;display:grid;place-items:center;font-size:27px;
    background:var(--pc-soft);border:1px solid var(--line)}
  .hero h2{font-family:var(--fd);font-size:30px;letter-spacing:.6px;font-weight:400;line-height:1}
  .hero .tag{font-size:13px;color:var(--muted);margin-top:5px}
  .hero .badge{margin-left:auto;flex:none}

  .lbl{font-family:var(--fm);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);
    margin:20px 0 8px;display:block}

  /* open buttons */
  .links{display:grid;gap:8px}
  .lk{display:flex;align-items:center;gap:11px;background:var(--card2);border:1px solid var(--line);
    border-radius:var(--r-sm);padding:13px 14px;transition:border-color .15s,transform .05s}
  .lk:active{transform:scale(.985)} .lk:hover{border-color:var(--line2)}
  .lk .em{font-size:17px;flex:none;width:22px;text-align:center}
  .lk .txt{flex:1;min-width:0}
  .lk .txt b{font-size:14.5px;font-weight:600;display:block}
  .lk .txt span{font-family:var(--fm);font-size:11px;color:var(--dim);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .lk .go{color:var(--dim);font-size:15px;flex:none}
  .lk.primary{border-color:var(--pc);background:var(--pc-soft)}
  .lk.primary .go{color:var(--pc)}

  /* codes */
  .codes{display:grid;gap:8px}
  .code{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--line);
    border-radius:var(--r-sm);padding:11px 12px}
  .code .k{font-size:12px;color:var(--dim);flex:none;min-width:96px}
  .code .v{font-family:var(--fm);font-size:15.5px;font-weight:700;letter-spacing:.6px;flex:1;color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .copy{font-family:var(--fb);font-size:12px;font-weight:600;color:var(--muted);background:transparent;
    border:1px solid var(--line2);border-radius:9px;padding:8px 13px;cursor:pointer;flex:none;transition:.15s}
  .copy:active{transform:scale(.94)}
  .copy.done{color:var(--good);border-color:var(--good);background:var(--good-soft)}

  /* invites */
  .invites{display:grid;gap:8px}
  .inv{background:var(--card2);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px}
  .inv .row{display:flex;align-items:center;gap:10px}
  .inv .em{font-size:16px;flex:none;width:20px;text-align:center}
  .inv b{font-size:13.5px;font-weight:600}
  .inv p{font-size:12px;color:var(--dim);margin:6px 0 0;line-height:1.45}
  .inv .share{margin-left:auto;font-family:var(--fb);font-size:12px;font-weight:600;color:var(--pc);
    background:var(--pc-soft);border:1px solid var(--line);border-radius:9px;padding:8px 13px;cursor:pointer;flex:none;transition:.15s}
  .inv .share:active{transform:scale(.94)} .inv .share.done{color:var(--good);border-color:var(--good)}

  /* who needs what */
  .split{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .col{background:var(--card2);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px}
  .col h4{font-size:11px;letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .col.yes h4{color:var(--good)} .col.no h4{color:var(--bad)}
  .col ul{list-style:none;display:grid;gap:6px}
  .col li{font-size:12.5px;color:var(--muted);padding-left:15px;position:relative;line-height:1.35}
  .col.yes li::before{content:'✓';position:absolute;left:0;color:var(--good)}
  .col.no li::before{content:'✕';position:absolute;left:0;color:var(--bad)}
  @media(max-width:400px){.split{grid-template-columns:1fr}}

  /* script */
  .say{background:linear-gradient(180deg,var(--pc-soft),transparent);border:1px solid var(--line);
    border-left:3px solid var(--pc);border-radius:var(--r-sm);padding:13px 14px;margin-top:8px}
  .say .who{font-family:var(--fm);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--pc);margin-bottom:6px}
  .say p{font-size:13.5px;color:var(--text);line-height:1.55}
  .say p + .who{margin-top:12px}

  /* pills (one-pager) */
  .pills{display:flex;flex-wrap:wrap;gap:8px}
  .pill{font-size:13px;font-weight:600;background:var(--card2);border:1px solid var(--line);
    border-radius:var(--r-pill);padding:9px 14px;transition:.15s}
  .pill:active{transform:scale(.96)} .pill:hover{border-color:var(--pc)}
  .note{font-size:12px;color:var(--dim);margin-top:10px;line-height:1.5}
  .warn{background:var(--bad-soft);border:1px solid var(--bad);color:#ffb4ae;border-radius:9px;
    padding:9px 11px;font-size:11.5px;margin-top:14px}

  footer{text-align:center;color:var(--dim);font-size:11px;font-family:var(--fm);padding:30px 0 6px}

  /* toast */
  .toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(12px);
    background:var(--text);color:#111;font-size:13px;font-weight:700;padding:11px 18px;border-radius:var(--r-pill);
    box-shadow:0 10px 30px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.2s;z-index:50;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  [hidden]{display:none!important}
  #detail{animation:rise .22s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){#detail,#detail *{animation:none!important}}
</style>
</head>
<body>

/* ---------- toast + copy ---------- */
var toast = document.getElementById('toast'), tT;
function ping(msg){ toast.textContent = msg || 'Copied ✓'; toast.classList.add('show'); clearTimeout(tT); tT = setTimeout(function(){ toast.classList.remove('show'); }, 1500); }
function copyText(val, cb){
  function done(){ if(cb)cb(); }
  if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(val).then(done).catch(fallback); }
  else fallback();
  function fallback(){ var t=document.createElement('textarea'); t.value=val; t.style.position='fixed'; t.style.opacity='0'; document.body.appendChild(t); t.select(); try{ document.execCommand('copy'); done(); }catch(e){ ping('Copy failed — long-press to copy'); } document.body.removeChild(t); }
}

/* ---------- HOME grid ---------- */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function renderGrid(){
  var g = document.getElementById('grid'), html = '';
  PROJECTS.forEach(function(p){
    if(p.owner){
      html += '<button class="tile owner-tile" data-go="'+p.id+'">'+
        '<div class="ic">'+p.icon+'</div>'+
        '<div style="flex:1"><h3>'+esc(p.name)+'</h3><div class="tag">'+esc(p.tagShort)+'</div></div>'+
        '<span class="arrow">›</span></button>';
      return;
    }
    var badge = p.badge ? '<span class="badge '+p.badge.c+'">'+esc(p.badge.t)+'</span>' : '';
    html += '<button class="tile" data-go="'+p.id+'" style="--tpc:'+p.color+'">'+
      '<div class="ic">'+p.icon+'</div>'+
      '<h3>'+esc(p.name)+'</h3>'+
      '<div class="tag">'+esc(p.tagShort)+'</div>'+
      '<div class="foot">'+badge+'<span class="arrow">›</span></div>'+
    '</button>';
  });
  g.innerHTML = html;
}

/* ---------- DETAIL ---------- */
function renderDetail(p){
  var h = '';
  h += '<button class="back" onclick="goHome()">‹ &nbsp;All apps</button>';

  var badge = p.badge ? '<span class="badge '+p.badge.c+'">'+esc(p.badge.t)+'</span>' : '';
  h += '<div class="hero"><div class="ic">'+p.icon+'</div><div style="flex:1"><h2>'+esc(p.name)+'</h2>'+
       '<div class="tag">'+esc(p.tag)+'</div></div>'+badge+'</div>';

  // links
  if(p.links && p.links.length){
    h += '<span class="lbl">Open</span><div class="links">';
    p.links.forEach(function(l){
      h += '<a class="lk'+(l.primary?' primary':'')+'" href="'+l.u+'" target="_blank" rel="noopener">'+
        '<span class="em">'+l.em+'</span><span class="txt"><b>'+esc(l.b)+'</b>'+
        '<span>'+esc(l.sub || l.u.replace(BASE,'')) +'</span></span><span class="go">↗</span></a>';
    });
    h += '</div>';
  }

  // one-pager pills
  if(p.pills){
    if(p.note) h += '<div class="note">'+p.note+'</div>';
    h += '<span class="lbl">Your demos — tap to open</span><div class="pills">';
    p.pills.forEach(function(pl){ h += '<a class="pill" href="'+pl.u+'" target="_blank" rel="noopener">'+esc(pl.n)+' ↗</a>'; });
    h += '</div>';
  }

  // codes
  if(p.codes && p.codes.length){
    h += '<span class="lbl">Codes — tap to copy</span><div class="codes">';
    p.codes.forEach(function(c){
      h += '<div class="code"><span class="k">'+esc(c.k)+'</span><span class="v">'+esc(c.v)+'</span>'+
        '<button class="copy" data-copy="'+esc(c.copy)+'">'+esc(c.btn||'Copy')+'</button></div>';
    });
    h += '</div>';
  }

  // invites
  if(p.invites && p.invites.length){
    h += '<span class="lbl">Invites — send these out</span><div class="invites">';
    p.invites.forEach(function(iv){
      var share = iv.share ? '<button class="share" data-share="'+esc(iv.share)+'">Copy link</button>' : '';
      h += '<div class="inv"><div class="row"><span class="em">'+iv.em+'</span><b>'+esc(iv.b)+'</b>'+share+'</div>'+
        (iv.d?'<p>'+iv.d+'</p>':'')+'</div>';
    });
    h += '</div>';
  }

  // who needs what
  if(p.yes){
    h += '<span class="lbl">Who needs what</span><div class="split">';
    h += '<div class="col yes"><h4>'+esc(p.yes.h)+'</h4><ul>'+p.yes.li.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul></div>';
    h += '<div class="col no"><h4>'+esc(p.no.h)+'</h4><ul>'+p.no.li.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul></div>';
    h += '</div>';
  }

  // what to say
  if(p.say){
    h += '<span class="lbl">What to say</span><div class="say">';
    p.say.forEach(function(s){ h += '<div class="who">'+esc(s.who)+'</div><p>'+s.p+'</p>'; });
    h += '</div>';
  }

  if(p.warn) h += '<div class="warn">'+p.warn+'</div>';

  var d = document.getElementById('detail');
  d.style.setProperty('--pc', p.color);
  d.style.setProperty('--pc-soft', hexSoft(p.color));
  d.innerHTML = h;
  wireDetail(d);
}
function hexSoft(hex){
  var m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  if(!m) return 'rgba(255,122,0,.12)';
  return 'rgba('+parseInt(m[1],16)+','+parseInt(m[2],16)+','+parseInt(m[3],16)+',.14)';
}
function wireDetail(d){
  d.querySelectorAll('.copy[data-copy]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var val = btn.getAttribute('data-copy');
      copyText(val, function(){ btn.classList.add('done'); var o=btn.textContent; btn.textContent='Copied ✓'; ping('Copied “'+val+'”'); setTimeout(function(){ btn.classList.remove('done'); btn.textContent=o; }, 1500); });
    });
  });
  d.querySelectorAll('.share[data-share]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var val = btn.getAttribute('data-share');
      copyText(val, function(){ btn.classList.add('done'); var o=btn.textContent; btn.textContent='Copied ✓'; ping('Link copied — paste to share'); setTimeout(function(){ btn.classList.remove('done'); btn.textContent=o; }, 1600); });
    });
  });
}

/* ---------- routing ---------- */
function findProject(id){ for(var i=0;i<PROJECTS.length;i++) if(PROJECTS[i].id===id) return PROJECTS[i]; return null; }
function goHome(){ if(location.hash) location.hash=''; else route(); }
function route(){
  var id = (location.hash||'').replace(/^#/,''), p = findProject(id);
  var home = document.getElementById('home'), detail = document.getElementById('detail');
  if(p){ renderDetail(p); home.hidden=true; detail.hidden=false; window.scrollTo(0,0); }
  else { home.hidden=false; detail.hidden=true; }
}
document.getElementById('grid').addEventListener('click', function(e){
  var t = e.target.closest('[data-go]'); if(t) location.hash = t.getAttribute('data-go');
});
window.addEventListener('hashchange', route);
renderGrid();
route();
</script>
</body>
