[build]
  publish = "."

# --- Athlete OS -----------------------------------------------------------
# Clean short entry: /os → the Athlete OS app (served from /athlete-os/).
# Path depth is preserved so the pages' relative assets keep resolving.
[[redirects]]
  from = "/os"
  to = "/os/"
  status = 301

[[redirects]]
  from = "/os/*"
  to = "/athlete-os/:splat"
  status = 200

# --- NOVA Rewards (giveaway) ---------------------------------------------
# publish stays "." so the existing site root and other products are
# untouched; the config below is scoped to /giveaway/ only.

# Clean path: /giveaway (no trailing slash) → canonical folder.
[[redirects]]
  from = "/giveaway"
  to = "/giveaway/"
  status = 301

# Security headers for the giveaway app.
[[headers]]
  for = "/giveaway/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
